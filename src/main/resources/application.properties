server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pvrprimenaturals}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

pvr.app.jwtSecret=${JWT_SECRET:SuperSecretKeyForPVRPrimeNaturalsECommerceApplicationWhichShouldBeVeryLongAndSecure1234567890}
pvr.app.jwtExpirationMs=86400000

# Mail Configuration (Example using Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:pradeepperumalla544@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# AWS S3 Configuration
aws.s3.access-key=${AWS_ACCESS_KEY}
aws.s3.secret-key=${AWS_SECRET_KEY}
aws.s3.bucket=ajapvr
aws.s3.region=ap-south-1
 
# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:your_razorpay_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:your_razorpay_key_secret}
