server.port=${PORT:8080}

# ── Database (Neon PostgreSQL) ────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-ancient-thunder-atv90wqb-pooler.c-9.us-east-1.aws.neon.tech:5432/neondb?sslmode=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
pvr.app.jwtSecret=${JWT_SECRET:default-jwt-secret-change-in-production-must-be-very-long}
pvr.app.jwtExpirationMs=86400000

# ── Mail ──────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@example.com}
spring.mail.password=${MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── AWS S3 ────────────────────────────────────────────────────────────────────
aws.s3.access-key=${AWS_ACCESS_KEY:changeme}
aws.s3.secret-key=${AWS_SECRET_KEY:changeme}
aws.s3.bucket=${AWS_S3_BUCKET:ajapvr}
aws.s3.region=${AWS_S3_REGION:ap-south-1}

# ── Razorpay ──────────────────────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:changeme}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:changeme}

# ── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://pvr-prime-naturals-fe.vercel.app}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
